{% comment %}Base layout (parent) — MD3 design system + reusable components.{% endcomment %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Remarcable{% endblock %}</title>

    <!-- Roboto (MD type scale) + Material Symbols (MD iconography) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0"
      rel="stylesheet"
    />

    <style>
      /* ============================================================
       MD3 DESIGN TOKENS  (color roles · elevation · shape)
       Seed/primary = electrical amber, expressed as Material roles.
       ============================================================ */
      :root {
        /* Color roles */
        --md-primary: #8a5a00;
        --md-on-primary: #ffffff;
        --md-primary-container: #ffddb0;
        --md-on-primary-container: #2b1700;
        --md-secondary: #4d5f68;
        --md-on-secondary: #ffffff;
        --md-secondary-container: #d1e5ee;
        --md-on-secondary-container: #081e26;
        --md-tertiary: #1f6feb;
        --md-on-tertiary: #ffffff;

        --md-background: #fdf8f3;
        --md-surface: #fdf8f3;
        --md-surface-container-lowest: #ffffff;
        --md-surface-container-low: #f8f2ec;
        --md-surface-container: #f3ece5;
        --md-surface-container-high: #ede6df;
        --md-surface-container-highest: #e7e0d9;
        --md-on-surface: #1f1b16;
        --md-on-surface-variant: #4f4539;
        --md-outline: #817567;
        --md-outline-variant: #d3c4b4;
        --md-error: #ba1a1a;

        /* Elevation (MD3 light) */
        --md-elev-1:
          0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
        --md-elev-2:
          0 1px 2px rgba(0, 0, 0, 0.3), 0 2px 6px 2px rgba(0, 0, 0, 0.15);
        --md-elev-3:
          0 4px 8px 3px rgba(0, 0, 0, 0.15), 0 1px 3px rgba(0, 0, 0, 0.3);

        /* Shape scale */
        --md-shape-xs: 4px;
        --md-shape-sm: 8px;
        --md-shape-md: 12px;
        --md-shape-lg: 16px;
        --md-shape-full: 999px;
      }

      /* ============================================================
       BASE + TYPE SCALE (Roboto)
       ============================================================ */
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background: var(--md-background);
        color: var(--md-on-surface);
        font-family: "Roboto", system-ui, sans-serif;
        line-height: 1.5;
      }
      a {
        color: inherit;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        line-height: 1;
        vertical-align: middle;
        user-select: none;
      }

      /* ============================================================
       TOP APP BAR (MD component)
       ============================================================ */
      .md-top-app-bar {
        position: sticky;
        top: 0;
        z-index: 20;
        height: 64px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        background: var(--md-surface-container);
        color: var(--md-on-surface);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: inherit;
      }
      .brand__logo {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border-radius: var(--md-shape-md);
        font-size: 24px;
        background: var(--md-primary-container);
        color: var(--md-on-primary-container);
      }
      .md-top-app-bar__title {
        font-size: 22px;
        font-weight: 500;
      } /* title-large */
      .spacer {
        flex: 1;
      }

      /* ============================================================
       LAYOUT
       ============================================================ */
      .page {
        padding: 0 24px;
        height: calc(100vh - 64px);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .page-head {
        margin: 28px 0 24px;
        flex: none;
      }
      .page-head__title {
        margin: 0 0 4px;
        font-size: 32px;
        font-weight: 400;
      } /* headline-medium */
      .page-head__subtitle {
        margin: 0;
        font-size: 14px;
        color: var(--md-on-surface-variant);
      }
      .layout {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 24px;
        align-items: stretch;
        flex: 1;
        min-height: 0;
        padding-bottom: 24px;
      }

      /* ============================================================
       CARD (MD elevated/filled card primitive — reused everywhere)
       ============================================================ */
      .md-card {
        background: var(--md-surface-container-low);
        border-radius: var(--md-shape-md);
        box-shadow: var(--md-elev-1);
      }
      .md-card--elevated {
        transition:
          box-shadow 0.2s,
          transform 0.2s;
      }
      .md-card--elevated:hover {
        box-shadow: var(--md-elev-2);
        transform: translateY(-2px);
      }

      /* ============================================================
       BUTTON (MD common buttons: filled / outlined / text)
       State layer = inset overlay (no extra markup).
       ============================================================ */
      .md-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 40px;
        padding: 0 24px;
        border: none;
        border-radius: var(--md-shape-full);
        font:
          500 14px/1 "Roboto",
          sans-serif;
        letter-spacing: 0.1px;
        cursor: pointer;
        text-decoration: none;
        transition:
          box-shadow 0.15s,
          background 0.15s;
      }
      .md-btn .material-symbols-outlined {
        font-size: 18px;
      }
      .md-btn--filled {
        background: var(--md-primary);
        color: var(--md-on-primary);
      }
      .md-btn--filled:hover {
        box-shadow:
          var(--md-elev-1),
          inset 0 0 0 100px rgba(255, 255, 255, 0.08);
      }
      .md-btn--filled:active {
        box-shadow: inset 0 0 0 100px rgba(255, 255, 255, 0.16);
      }
      .md-btn--outlined {
        background: transparent;
        color: var(--md-primary);
        border: 1px solid var(--md-outline);
      }
      .md-btn--outlined:hover {
        box-shadow: inset 0 0 0 100px rgba(138, 90, 0, 0.06);
      }
      .md-btn--text {
        background: transparent;
        color: var(--md-primary);
        padding: 0 12px;
      }
      .md-btn--text:hover {
        box-shadow: inset 0 0 0 100px rgba(138, 90, 0, 0.06);
      }

      /* ============================================================
       TEXT FIELD (MD filled, floating label) + SELECT FIELD
       ============================================================ */
      .md-text-field,
      .md-select-field {
        position: relative;
        margin-bottom: 16px;
      }
      .md-text-field__input,
      .md-select-field__select {
        width: 100%;
        border: none;
        outline: none;
        background: var(--md-surface-container-highest);
        border-radius: var(--md-shape-xs) var(--md-shape-xs) 0 0;
        border-bottom: 1px solid var(--md-on-surface-variant);
        padding: 22px 16px 6px 48px;
        font:
          400 16px "Roboto",
          sans-serif;
        color: var(--md-on-surface);
      }
      .md-select-field__select {
        appearance: none;
        cursor: pointer;
        padding-right: 44px;
      }
      .md-text-field__input:focus,
      .md-select-field__select:focus {
        border-bottom: 2px solid var(--md-primary);
        padding-bottom: 5px;
      }
      .md-text-field__icon,
      .md-select-field__icon {
        position: absolute;
        left: 14px;
        top: 16px;
        color: var(--md-on-surface-variant);
        pointer-events: none;
      }
      .md-select-field__arrow {
        position: absolute;
        right: 12px;
        top: 16px;
        color: var(--md-on-surface-variant);
        pointer-events: none;
      }
      .md-text-field__label,
      .md-select-field__label {
        position: absolute;
        left: 48px;
        top: 18px;
        pointer-events: none;
        font:
          400 16px "Roboto",
          sans-serif;
        color: var(--md-on-surface-variant);
        transition: 0.15s;
      }
      /* float label up when focused or filled */
      .md-text-field__input:focus + .md-text-field__label,
      .md-text-field__input:not(:placeholder-shown) + .md-text-field__label {
        top: 8px;
        font-size: 12px;
      }
      .md-text-field__input:focus + .md-text-field__label {
        color: var(--md-primary);
      }
      .md-select-field__label {
        top: 8px;
        font-size: 12px;
      } /* select always has a value */
      .md-select-field__select:focus + .md-select-field__label {
        color: var(--md-primary);
      }

      /* ============================================================
       CHIPS (MD filter chip + tonal chip + assist chip)
       ============================================================ */
      .md-chip-set {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .md-filter-chip {
        position: relative;
        cursor: pointer;
      }
      .md-filter-chip input {
        position: absolute;
        inset: 0;
        margin: 0;
        opacity: 0;
        cursor: pointer;
      }
      .md-filter-chip__label {
        display: inline-flex;
        align-items: center;
        height: 32px;
        padding: 0 14px;
        border: 1px solid var(--md-outline);
        border-radius: var(--md-shape-sm);
        font:
          500 14px "Roboto",
          sans-serif;
        color: var(--md-on-surface-variant);
        transition: 0.15s;
      }
      /* leading glyphs use margin (not gap) so a collapsed one leaves no space */
      .md-filter-chip__icon,
      .md-filter-chip__check {
        font-size: 18px;
        margin-right: 6px;
        color: var(--md-primary);
        transition: 0.15s;
      }
      .md-filter-chip__check {
        width: 0;
        margin-right: 0;
        overflow: hidden;
        opacity: 0;
      }
      .md-filter-chip input:checked + .md-filter-chip__label {
        background: var(--md-secondary-container);
        color: var(--md-on-secondary-container);
        border-color: transparent;
        padding-left: 12px;
      }
      /* selected: swap the tag icon out for the checkmark */
      .md-filter-chip
        input:checked
        + .md-filter-chip__label
        .md-filter-chip__icon {
        width: 0;
        margin-right: 0;
        overflow: hidden;
        opacity: 0;
      }
      .md-filter-chip
        input:checked
        + .md-filter-chip__label
        .md-filter-chip__check {
        width: 18px;
        margin-right: 6px;
        opacity: 1;
        color: var(--md-on-secondary-container);
      }
      .md-filter-chip input:focus-visible + .md-filter-chip__label {
        outline: 2px solid var(--md-primary);
        outline-offset: 2px;
      }

      .md-tonal-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 32px;
        padding: 0 12px;
        border-radius: var(--md-shape-sm);
        font:
          500 13px "Roboto",
          sans-serif;
        background: var(--md-secondary-container);
        color: var(--md-on-secondary-container);
      }
      .md-tonal-chip__icon {
        font-size: 18px;
      }

      .md-assist-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 30px;
        padding: 0 12px 0 8px;
        border: 1px solid var(--md-outline-variant);
        border-radius: var(--md-shape-sm);
        background: var(--md-surface-container-lowest);
        color: var(--md-on-surface);
        font:
          500 12px "Roboto",
          sans-serif;
        white-space: nowrap;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .md-assist-chip:hover {
        border-color: var(--md-outline);
        background: var(--md-surface-container-low);
      }
      .md-assist-chip .material-symbols-outlined {
        font-size: 18px;
        color: var(--md-primary); /* MD3 assist-chip: leading icon in primary */
      }

      /* ============================================================
       PAGE-SPECIFIC: filters panel, results bar, product card, grid, empty
       ============================================================ */
      .filters {
        padding: 20px;
        max-height: 100%;
        overflow-y: auto;
      }
      .filters__title {
        margin: 0 0 20px;
        font: 500 14px "Roboto";
        letter-spacing: 0.1px;
        text-transform: uppercase;
        color: var(--md-on-surface-variant);
      }
      .filters__group {
        margin-bottom: 20px;
      }
      .filters__group-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }
      .filters__group-label {
        font: 500 13px "Roboto";
        color: var(--md-on-surface);
      }
      /* tag list scrolls within a bounded height so the buttons stay visible */
      .filters__tags {
        max-height: 168px;
        overflow-y: auto;
        scrollbar-gutter: stable;
        padding-right: 4px;
      }
      /* MD3 segmented buttons: tag match mode (Any / All) */
      .md-segmented {
        display: inline-flex;
        border: 1px solid var(--md-outline);
        border-radius: var(--md-shape-full);
        overflow: hidden;
      }
      .md-segmented__option {
        position: relative;
        display: inline-flex;
      }
      .md-segmented__option input {
        position: absolute;
        inset: 0;
        margin: 0;
        opacity: 0;
        cursor: pointer;
      }
      .md-segmented__option span {
        display: inline-flex;
        align-items: center;
        height: 26px;
        padding: 0 12px;
        font: 500 12px "Roboto";
        color: var(--md-on-surface-variant);
        cursor: pointer;
        transition: 0.15s;
      }
      .md-segmented__option + .md-segmented__option span {
        border-left: 1px solid var(--md-outline);
      }
      .md-segmented__option input:checked + span {
        background: var(--md-secondary-container);
        color: var(--md-on-secondary-container);
      }
      .md-segmented__option input:focus-visible + span {
        outline: 2px solid var(--md-primary);
        outline-offset: -2px;
      }
      .filters__actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .filters__actions .md-btn--filled {
        flex: 1;
      }
      .muted {
        margin: 0;
        color: var(--md-on-surface-variant);
        font-size: 14px;
      }

      .results-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 0px 16px;
        margin-bottom: 16px;
      }
      .results-bar__count {
        margin: 0;
        font: 500 16px "Roboto";
      }
      .results-bar__count span {
        color: var(--md-on-surface-variant);
        font-weight: 400;
      }
      .results-bar__clear {
        margin-left: auto;
      }

      .grid {
        display: grid;
        gap: 16px;
        padding: 16px;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      }
      .card {
        height: 340px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow: hidden;
      }
      .card__cat {
        align-self: flex-start;
        background: var(--md-primary-container);
        color: var(--md-on-primary-container);
      }
      .card__title {
        margin: 0;
        font: 500 16px "Roboto";
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      } /* title-medium */
      .card__desc {
        margin: 0;
        flex: 1; /* absorbs slack so tags + meta stay bottom-aligned (no margin:auto) */
        min-height: 0;
        font: 400 14px "Roboto";
        color: var(--md-on-surface-variant);
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      } /* body-medium */
      .card__tags {
        flex: none;
        gap: 6px;
      }
      .card__meta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin: 0;
        padding-top: 12px;
        border-top: 1px solid var(--md-outline-variant);
        font: 400 12px "Roboto";
        color: var(--md-on-surface-variant);
      }
      .card__meta .material-symbols-outlined {
        font-size: 16px;
      }

      .empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 64px 24px;
        color: var(--md-on-surface-variant);
      }
      .empty__icon {
        font-size: 48px;
        color: var(--md-outline);
      }
      .empty__title {
        margin: 12px 0 6px;
        font: 400 22px "Roboto";
        color: var(--md-on-surface);
      }
      .empty__text {
        margin: 0;
        font: 400 14px "Roboto";
      }

      /* ============================================================
       RESPONSIVE
       ============================================================ */
      @media (max-width: 860px) {
        body {
          height: auto;
          overflow: auto;
        }
        .page {
          height: auto;
          display: block;
        }
        .layout {
          grid-template-columns: 1fr;
          min-height: 0;
          padding-bottom: 0;
        }
        .filters {
          max-height: none;
          overflow: visible;
        }
        .results {
          height: auto;
        }
        .results__scroll {
          overflow: visible;
          padding-bottom: 0;
        }
        .pagination {
          position: static;
          transform: none;
          margin: 24px auto 0;
          width: max-content;
        }
      }

      /* Results column: fixed header, internally scrolling grid */
      .results {
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
        position: relative;
      }
      .results__scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        scrollbar-gutter: stable; /* reserve scrollbar space so the column count is stable */
        padding-bottom: 76px; /* clearance for the floating pagination */
      }

      /* Floating pagination pill — always visible above the list */
      .pagination {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        padding: 6px 10px;
        background: var(--md-surface-container-high);
        border-radius: var(--md-shape-full);
        box-shadow: var(--md-elev-2);
        z-index: 5;
      }
      .pagination__status {
        font: 500 13px "Roboto";
        color: var(--md-on-surface-variant);
      }
      .pagination__disabled {
        opacity: 0.38;
        pointer-events: none;
      }

      /* "Did you mean" banner */
      .did-you-mean {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        padding: 12px 16px;
        border-radius: var(--md-shape-md);
        background: var(--md-primary-container);
        color: var(--md-on-primary-container);
        font: 400 14px "Roboto";
      }
      .did-you-mean .material-symbols-outlined {
        font-size: 20px;
      }
      .did-you-mean__link {
        font-weight: 600;
        color: var(--md-on-primary-container);
        text-decoration: underline;
      }
    </style>

    {% block extra_head %}{% endblock %}
  </head>
  <body>
    {% include "components/topbar.html" %}

    <main class="page">{% block content %}{% endblock %}</main>

    {% block extra_js %}{% endblock %}
  </body>
</html>
